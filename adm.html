<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Controle - Lista da Duda</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #f2f7fb; margin: 0; padding: 20px; color: #2b3a4a; }
    header { background: #1a4f70; color: white; padding: 20px; text-align: center; border-radius: 10px; margin-bottom: 30px; box-shadow: 0 4px 10px rgba(58, 124, 165, 0.15); border-bottom: 4px solid #ffd700; }
    h1 { margin: 0; font-size: 24px; font-family: 'Georgia', serif; }
    header p { margin: 10px 0 0 0; font-size: 14px; opacity: 0.9; }
    
    .container { max-width: 800px; margin: 0 auto; }
    
    .titulo-secao { text-align: center; color: #1a4f70; font-family: 'Georgia', serif; font-size: 22px; font-weight: bold; margin-bottom: 20px; }
    
    /* Estilização idêntica ao modelo da foto, mas em Azul */
    .tabela-container { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 12px rgba(43, 58, 74, 0.05); border: 1px solid #b0cfe0; }
    
    table { width: 100%; border-collapse: collapse; background: white; border: 1px solid #b0cfe0; }
    th, td { padding: 12px; text-align: left; border: 1px solid #b0cfe0; }
    
    th { background-color: #3a7ca5; color: white; font-weight: bold; text-align: center; font-size: 15px; }
    
    /* Centraliza os números e destaca as fontes */
    td.col-numero { text-align: center; font-weight: bold; color: #3a7ca5; width: 60px; font-size: 16px; background-color: #fcfdfe; }
    td.col-presente { font-size: 15px; color: #2b3a4a; }
    td.col-escolheu { font-size: 15px; color: #2b3a4a; display: flex; align-items: center; gap: 8px; border: none; }
    
    /* Ajuste para a coluna de ação ficar limpa */
    td.col-acao { text-align: center; width: 100px; }
    
    .btn-liberar { background: #f0ad4e; color: white; padding: 6px 12px; font-size: 13px; border-radius: 5px; font-weight: bold; cursor: pointer; border: none; transition: background 0.2s; }
    .btn-liberar:hover { background: #ec971f; }
  </style>
</head>
<body>

  <header>
    <h1>🔑 Painel de Controle da Duda e da Mamãe 👑</h1>
    <p>Acompanhe quem escolheu cada presente!</p>
  </header>

  <div class="container">
    
    <div class="titulo-secao">Presentes Reservados</div>
    
    <div class="tabela-container">
      <div style="overflow-x: auto;">
        <table>
          <thead>
            <tr>
              <th>Nº</th>
              <th>Presente</th>
              <th>Quem escolheu</th>
              <th>Ação</th>
            </tr>
          </thead>
          <tbody id="tabelaPresentes">
            <tr>
              <td colspan="4" style="text-align: center; padding: 20px;">Carregando escolhas...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <script>
    const SUPABASE_URL = "https://pfagquntwcfwjblezjro.supabase.co";
    const SUPABASE_KEY = "sb_publishable_Rkm1UZv7J13m8kVhcvrIpA_IP_wl7zu"; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      global: { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
    });

    async function carregarTabela() {
      // Busca apenas os presentes reservados
      const { data: produtos, error } = await _supabase
        .from('presentes')
        .select('*')
        .or('reservado.eq.true,reservado.eq.TRUE,reservado_por.neq.""')
        .order('id', { ascending: true });

      if (error) {
        console.error("Erro ao carregar:", error);
        return;
      }

      const tbody = document.getElementById("tabelaPresentes");
      tbody.innerHTML = "";

      if (!produtos || produtos.length === 0) {
        tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; padding: 20px; color: #5a6e85;">Nenhum presente reservado até o momento.</td></tr>`;
        return;
      }

      let contador = 1;
      produtos.forEach(p => {
        const nomeConvidado = p.reservado_por ? p.reservado_por.trim() : "Convidado";
        
        tbody.innerHTML += `
          <tr>
            <td class="col-numero">${contador}</td>
            <td class="col-presente">${p.nome}</td>
            <td>
              <div class="col-col-escolheu">🎁 ${nomeConvidado}</div>
            </td>
            <td class="col-acao">
              <button class="btn-liberar" onclick="liberarItem(${p.id}, '${p.nome}')">Liberar</button>
            </td>
          </tr>
        `;
        contador++;
      });
    }

    async function liberarItem(id, nome) {
      if (confirm(`Tem certeza que deseja liberar o presente "${nome}"? Ele voltará para a lista pública.`)) {
        const { error } = await _supabase
          .from('presentes')
          .update({ reservado: false, reservado_por: '' })
          .eq('id', id);

        if (error) {
          alert("Erro ao liberar item.");
        } else {
          carregarTabela();
        }
      }
    }

    carregarTabela();
  </script>
</body>
</html>
